apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Container images must not use the mutable ':latest' tag.
      Images should always be pinned to a specific version or immutable digest
      to ensure reproducible, auditable, and secure deployments.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod

      validate:
        message: "Container images using the ':latest' tag are not allowed. Use a versioned image tag instead."
        pattern:
          spec:
            containers:
              - image: "!*:latest"