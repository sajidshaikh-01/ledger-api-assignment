apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers must run with a read-only root filesystem to reduce the
      attack surface and prevent processes from writing or persisting
      malicious data on the container filesystem.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: require-readonly-root-filesystem
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - payments

      validate:
        message: "Containers must set securityContext.readOnlyRootFilesystem=true."
        pattern:
          spec:
            containers:
              - name: "*"
                securityContext:
                  readOnlyRootFilesystem: true