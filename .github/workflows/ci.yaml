name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ledger-api

jobs:

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  semgrep:
    name: SAST Scan
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/python
            p/flask

  docker-build:
    name: Build Push and Scan Docker Image
    runs-on: ubuntu-latest
    needs: semgrep

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ledger-api:${{ github.sha }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ledger-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

  cosign-sign:
    name: Sign Container Image
    runs-on: ubuntu-latest
    needs: docker-build

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image using Keyless Signing
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/ledger-api:${{ github.sha }}

  slsa-provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    needs: cosign-sign

    permissions:
      packages: write
      id-token: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SLSA Provenance Attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cat > predicate.json <<EOF
          {
            "buildType": "https://github.com/Attestations/GitHubActions@v1",
            "builder": {
              "id": "${{ github.workflow }}"
            },
            "invocation": {
              "configSource": {
                "uri": "https://github.com/${{ github.repository }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                }
              }
            }
          }
          EOF

          cosign attest \
            --yes \
            --predicate predicate.json \
            --type slsaprovenance \
            ghcr.io/${{ github.repository_owner }}/ledger-api:${{ github.sha }}