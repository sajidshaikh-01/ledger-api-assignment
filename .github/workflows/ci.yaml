name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'gitops/**'

  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ledger-api

jobs:

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  semgrep:
    name: SAST Scan
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/python
            p/flask

  docker-build:
    name: Build Push and Scan Docker Image
    runs-on: ubuntu-latest
    needs: semgrep

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Verify image is pullable
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

  cosign-sign:
    name: Sign Container Image
    runs-on: ubuntu-latest
    needs: docker-build

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image using Keyless Signing (by digest)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ needs.docker-build.outputs.digest }}

  slsa-provenance:
    name: Generate SLSA Provenance
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - cosign-sign

    permissions:
      packages: write
      id-token: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SLSA Provenance Attestation
        run: |
          cat > predicate.json <<EOF
          {
            "buildType": "https://github.com/Attestations/GitHubActions@v1",
            "builder": {
              "id": "${{ github.workflow }}"
            },
            "invocation": {
              "configSource": {
                "uri": "https://github.com/${{ github.repository }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                }
              }
            }
          }
          EOF

          cosign attest \
            --yes \
            --predicate predicate.json \
            --type slsaprovenance \
            ${{ env.IMAGE_NAME }}@${{ needs.docker-build.outputs.digest }}

  update-gitops-manifest:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: slsa-provenance

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update image tag in deployment manifest
        run: |
          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            gitops/ledger-api/deployment-ledger-api.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/ledger-api/deployment-ledger-api.yaml
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: bump ledger-api image to ${{ github.sha }} [skip ci]"
          git push