apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ledger-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sajidshaikh-01/ledger-api-assignment.git
    targetRevision: main
    path: gitops/ledger-api

  destination:
    server: https://kubernetes.default.svc
    namespace: payments

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true